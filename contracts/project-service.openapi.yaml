openapi: 3.1.0
info:
  title: foculist project-service API
  version: 0.1.0
components:
  parameters:
    tenantHeader:
      in: header
      name: X-Tenant-ID
      required: true
      schema:
        type: string
      description: Tenant identifier for request isolation
  schemas:
    ProjectSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [PLANNED, RUNNING, PAUSED, COMPLETED, ARCHIVED]
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        dueDate:
          type: string
          format: date
          nullable: true
        tenantId:
          type: string
      required: [id, name, status, priority, tenantId]
    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [PLANNED, RUNNING, PAUSED, COMPLETED, ARCHIVED]
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        dueDate:
          type: string
          format: date
      required: [name]
    UpdateProjectSettingsRequest:
      type: object
      properties:
        workflowStatuses:
          type: array
          items:
            type: string
        defaultView:
          type: string
          enum: [BOARD, LIST, TIMELINE, CALENDAR]
    ProjectSettings:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
        workflowStatuses:
          type: array
          items:
            type: string
        defaultView:
          type: string
          enum: [BOARD, LIST, TIMELINE, CALENDAR]
        tenantId:
          type: string
        updatedAt:
          type: string
          format: date-time
      required: [projectId, workflowStatuses, defaultView, tenantId, updatedAt]
paths:
  /v1/projects:
    get:
      summary: List projects
      parameters:
        - $ref: '#/components/parameters/tenantHeader'
      responses:
        "200":
          description: Projects list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectSummary'
    post:
      summary: Create project
      parameters:
        - $ref: '#/components/parameters/tenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSummary'
  /v1/projects/{id}/settings:
    put:
      summary: Update project settings
      parameters:
        - $ref: '#/components/parameters/tenantHeader'
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectSettingsRequest'
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSettings'
