services:
  # Infrastructure
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: foculist
      POSTGRES_PASSWORD: foculist-secret-password
      POSTGRES_DB: foculist
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foculist"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    volumes:
      - ./keycloak-init:/opt/keycloak/data/import

  # Applications
  gateway-bff:
    build:
      context: .
      dockerfile: services/gateway-bff/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/foculist
      SPRING_DATA_REDIS_HOST: redis
      APP_IDENTITY_URL: http://identity-service:8081
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/foculist
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  planning-service:
    build:
      context: .
      dockerfile: services/planning-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/foculist
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  project-service:
    build:
      context: .
      dockerfile: services/project-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/foculist
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
