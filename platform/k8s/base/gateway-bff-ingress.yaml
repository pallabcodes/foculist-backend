apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-bff
  namespace: foculist
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: foculist.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-bff
                port:
                  number: 80
