apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-bff
  namespace: foculist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-bff
  template:
    metadata:
      labels:
        app: gateway-bff
    spec:
      containers:
        - name: app
          image: yourorg/gateway-bff:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: IDENTITY_BASE_URL
              value: "http://identity-service"
            - name: PROJECT_BASE_URL
              value: "http://project-service"
            - name: PLANNING_BASE_URL
              value: "http://planning-service"
            - name: CALENDAR_BASE_URL
              value: "http://calendar-service"
            - name: MEETING_BASE_URL
              value: "http://meeting-service"
            - name: SYNC_BASE_URL
              value: "http://sync-service"
            - name: RESOURCE_BASE_URL
              value: "http://resource-service"
          envFrom:
            - configMapRef:
                name: foculist-runtime
            - secretRef:
                name: foculist-runtime
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-bff
  namespace: foculist
spec:
  selector:
    app: gateway-bff
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
