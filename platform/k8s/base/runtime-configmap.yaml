apiVersion: v1
kind: ConfigMap
metadata:
  name: foculist-runtime
  namespace: foculist
data:
  DB_URL: jdbc:postgresql://postgresql.default.svc.cluster.local:5432/foculist
  MONGODB_URI: mongodb://mongodb.default.svc.cluster.local:27017/foculist
  REDIS_HOST: redis.default.svc.cluster.local
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: kafka.default.svc.cluster.local:9092
  RABBITMQ_HOST: rabbitmq.default.svc.cluster.local
  RABBITMQ_PORT: "5672"
  AWS_REGION: us-east-1
  AWS_ENDPOINT: http://localstack.default.svc.cluster.local:4566
  CORS_ALLOWED_ORIGINS: http://localhost:3000
