apiVersion: v1
kind: ConfigMap
metadata:
  name: foculist-runtime
data:
  DB_URL: jdbc:postgresql://postgresql-prod.foculist.svc.cluster.local:5432/foculist
  MONGODB_URI: mongodb://mongodb-prod.foculist.svc.cluster.local:27017/foculist
  REDIS_HOST: redis-prod.foculist.svc.cluster.local
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: kafka-prod.foculist.svc.cluster.local:9092
  RABBITMQ_HOST: rabbitmq-prod.foculist.svc.cluster.local
  RABBITMQ_PORT: "5672"
  AWS_REGION: us-east-1
  AWS_ENDPOINT: http://localstack-prod.foculist.svc.cluster.local:4566
  CORS_ALLOWED_ORIGINS: https://app.foculist.com
