version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: foculist
      POSTGRES_PASSWORD: foculist
      POSTGRES_DB: foculist
    ports:
      - "5432:5432"

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  redpanda:
    image: redpandadata/redpanda:v23.3.6
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: sqs,sns,dynamodb,s3
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: foculist-keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_ENABLED=true
    command: start-dev --import-realm
    ports:
      - "9080:8080"
    volumes:
      - ../../keycloak-init:/opt/keycloak/data/import

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: foculist-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ../otel/otel-collector-config.yml:/etc/otel/config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v2.50.1
    volumes:
      - ../otel/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:2.9.4
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:10.3.1
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

  redisinsight:
    image: redislabs/redisinsight:latest
    ports:
      - "8001:8001"
    depends_on:
      - redis

  ollama-mock:
    image: alpine:3.18
    command: >
      sh -c "echo '{\"model\":\"foculist-ai\",\"created_at\":\"2026-04-06T12:00:00Z\",\"response\":\"[AI MOCK] Task enrichment complete: Added priority and milestone mappings.\",\"done\":true}' > /tmp/response.json && 
             while true; do printf 'HTTP/1.1 200 OK\r\nContent-Type: application/json\r\n\r\n' | cat - /tmp/response.json | nc -l -p 11434; done"
    ports:
      - "11434:11434"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  unleash-db:
    image: postgres:15
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: unleash
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash"]
      interval: 2s
      timeout: 5s
      retries: 10

  unleash:
    image: unleashorg/unleash-server:latest
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: postgres://unleash:unleash@unleash-db:5432/unleash
      DATABASE_SSL: "false"
      UNLEASH_URL: http://localhost:4242/api
    depends_on:
      unleash-db:
        condition: service_healthy

  registry:
    image: registry:2
    ports:
      - "5000:5000"
