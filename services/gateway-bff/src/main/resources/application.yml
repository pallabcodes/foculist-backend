spring:
  application:
    name: gateway-bff
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:9090/realms/foculist}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-},%X{tenantId:-}]"

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  gateway:
    downstream:
      identity: ${IDENTITY_BASE_URL:http://localhost:8081}
      project: ${PROJECT_BASE_URL:http://localhost:8082}
      planning: ${PLANNING_BASE_URL:http://localhost:8083}
      calendar: ${CALENDAR_BASE_URL:http://localhost:8084}
      meeting: ${MEETING_BASE_URL:http://localhost:8085}
      sync: ${SYNC_BASE_URL:http://localhost:8086}
      resource: ${RESOURCE_BASE_URL:http://localhost:8087}
  security:
    jwt:
      secret: ${JWT_SECRET:Zm9jdWxpc3QtZGV2LWp3dC1zZWNyZXQta2VlcC1jaGFuZ2U=}
  tenancy:
    default-tenant: public
    header: X-Tenant-ID
    parameter: tenant
    path-pattern: ^/api/tenants/([^/]+)/.*
    subdomain-pattern: ^([^.]+)\..*
    required: true
    allow-jwt-claim: true
    jwt-claim: tenant
    enforce-jwt-match: true
    skip-actuator: true

server:
  port: 8080
