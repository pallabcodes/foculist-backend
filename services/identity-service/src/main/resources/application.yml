spring:
  application:
    name: identity-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/foculist}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:foculist}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:foculist}}
  flyway:
    enabled: true
    schemas: identity
    default-schema: identity
    create-schemas: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: identity
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/foculist_identity-service}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: profile, email
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: user:email, read:user

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
    servers:
      - url: /api/identity
        description: Unified Gateway
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: true
management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    baggage:
      remote-fields: tenantId
      correlation:
        fields: tenantId
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-},%X{tenantId:-}]"

app:
  persistence:
    mode: jpa
  messaging:
    mode: kafka
  cache:
    enabled: true
  outbox:
    polling-enabled: true
    poll-interval-ms: 5000
    batch-size: 100
  aws:
    region: ${AWS_REGION:us-east-1}
    endpoint: ${AWS_ENDPOINT:http://localhost:4566}
    cognito:
      userPoolId: ${AWS_COGNITO_USER_POOL_ID:fallback-pool}
      clientId: ${AWS_COGNITO_APP_CLIENT_ID:fallback-client}
      endpointOverride: ${AWS_COGNITO_ENDPOINT:http://localhost:4566}
  security:
    jwt:
      secret: ${JWT_SECRET:Zm9jdWxpc3QtZGV2LWp3dC1zZWNyZXQta2VlcC1jaGFuZ2U=}
      access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000}
    oauth2:
      success-redirect-url: ${OAUTH2_SUCCESS_REDIRECT_URL:http://localhost:3000/login/success}
  tenancy:
    default-tenant: public
    header: X-Tenant-ID
    parameter: tenant
    path-pattern: ^/v1/tenants/([^/]+)/.*
    subdomain-pattern: ^([^.]+)\\..*
    required: true
    allow-jwt-claim: true
    jwt-claim: tenant
    enforce-jwt-match: true
    skip-actuator: true

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://keycloak:8080}
  realm: ${KEYCLOAK_REALM:foculist}
  client-id: ${KEYCLOAK_CLIENT_ID:foculist-local-client}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:foculist-dev-secret-that-is-long}

server:
  port: 8081
  forward-headers-strategy: none
  error:
    include-message: always
    include-binding-errors: always

# Dynamic Identity Provider Toggle (Keycloak vs LocalStack Cognito)
# Set to 'keycloak' (default) or 'cognito' to switch between local IdPs
identity:
  provider: keycloak
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
