spring:
  application:
    name: planning-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/foculist}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:foculist}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:foculist}}
  flyway:
    enabled: true
    schemas: planning
    create-schemas: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: planning
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/foculist_planning-service}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
    servers:
      - url: /api/planning
        description: Unified Gateway
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    baggage:
      remote-fields: tenantId
      correlation:
        fields: tenantId
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-},%X{tenantId:-}]"

app:
  persistence:
    mode: jpa
  messaging:
    mode: kafka
  cache:
    enabled: true
  outbox:
    polling-enabled: false
    poll-interval-ms: 5000
    batch-size: 100
    max-attempts: 10
    task-created-topic: planning.task.created.v1
  aws:
    region: ${AWS_REGION:us-east-1}
    endpoint: ${AWS_ENDPOINT:http://localhost:4566}
  security:
    jwt:
      secret: ${JWT_SECRET:Zm9jdWxpc3QtZGV2LWp3dC1zZWNyZXQta2VlcC1jaGFuZ2U=}
  tenancy:
    default-tenant: public
    header: X-Tenant-ID
    parameter: tenant
    path-pattern: ^/v1/tenants/([^/]+)/.*
    subdomain-pattern: ^([^.]+)\\..*
    required: true
    allow-jwt-claim: true
    jwt-claim: tenant
    enforce-jwt-match: true
    skip-actuator: true

server:
  port: 8083
  forward-headers-strategy: framework
